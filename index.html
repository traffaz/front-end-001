<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contactez-nous</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2d;
      --text:#e8eefc;
      --muted:#a9b7d1;
      --line:rgba(255,255,255,.12);
      --primary:#4f8cff;
      --primary2:#2f6fff;
      --danger:#ff4f6d;
      --ok:#29d391;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(79,140,255,.25), transparent 60%),
                  radial-gradient(900px 500px at 90% 10%, rgba(41,211,145,.18), transparent 55%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{ width:min(860px, 100%); }
    .header{ margin-bottom:16px; }
    .header h1{ margin:0 0 6px; font-size:28px; }
    .header p{ margin:0; color:var(--muted); line-height:1.45; }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow:hidden;
    }
    .card-body{ padding:18px; }

    form{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    .field{ display:flex; flex-direction:column; gap:8px; }
    label{ font-size:13px; color:var(--muted); }
    input, textarea, select{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(10,16,30,.55);
      color:var(--text);
      outline:none;
    }
    input:focus, textarea:focus, select:focus{
      border-color: rgba(79,140,255,.7);
    }
    textarea{ min-height:120px; resize:vertical; }
    .full{ grid-column: 1 / -1; }

    .actions{
      grid-column: 1 / -1;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      margin-top:6px;
    }
    button{
      border:0;
      border-radius: 12px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
      color: white;
      background: linear-gradient(180deg, var(--primary), var(--primary2));
      transition: opacity .15s ease;
      display:inline-flex;
      align-items:center;
      gap:10px;
    }
    button:disabled{ opacity:.6; cursor:not-allowed; }
    .secondary{
      background: transparent;
      border:1px solid rgba(255,255,255,.18);
      color: var(--text);
      font-weight:600;
    }

    .status{
      grid-column: 1 / -1;
      border-radius: 12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(17,26,45,.55);
      color: var(--muted);
      display:none;
      white-space: pre-wrap;
    }
    .status.ok{
      display:block;
      border-color: rgba(41,211,145,.35);
      color: rgba(210,255,238,.95);
    }
    .status.err{
      display:block;
      border-color: rgba(255,79,109,.45);
      color: rgba(255,210,219,.95);
    }

    .hint{ font-size:12px; color:var(--muted); margin-top:-4px; }

    @media (max-width: 720px){
      form{ grid-template-columns: 1fr; }
      .actions{ justify-content:stretch; }
      button{ width:100%; justify-content:center; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>Contactez-nous</h1>
      <p>Ajoute une criticité et envoie les données à ta Logic App via HTTP POST.</p>
    </div>

    <div class="card">
      <div class="card-body">
        <form id="contactForm" novalidate>
          <div class="field">
            <label for="nom">Nom</label>
            <input id="nom" name="nom" type="text" autocomplete="name" required />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field full">
            <label for="sujet">Sujet</label>
            <input id="sujet" name="sujet" type="text" required />
          </div>

          <div class="field">
            <label for="criticite">Criticité</label>
            <select id="criticite" name="criticite" required>
              <option value="" selected disabled>Choisir…</option>
              <option value="Faible">Faible</option>
              <option value="Moyenne">Moyenne</option>
              <option value="Élevée">Élevée</option>
              <option value="Critique">Critique</option>
            </select>
            <div class="hint">“Critique” si incident bloquant / production.</div>
          </div>

          <div class="field">
            <label for="telephone">Téléphone (optionnel)</label>
            <input id="telephone" name="telephone" type="tel" autocomplete="tel" />
          </div>

          <div class="field full">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>

          <div id="status" class="status"></div>

          <div class="actions">
            <button type="button" class="secondary" id="resetBtn">Réinitialiser</button>
            <button type="submit" id="sendBtn">
              <span id="sendLabel">Envoyez</span>
              <span id="spinner" style="display:none;">⏳</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ IMPORTANT : cette URL contient un "sig" (secret). Ne pas la mettre dans un repo public.
    const LOGIC_APP_URL = "https://prod-03.westeurope.logic.azure.com:443/workflows/791bf1b2e04a421ea1f18cc07174b408/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=pBZrXsGJSHff5wL7spta5tPVYeIhWePjFkCEIUymu5s";

    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const sendLabel = document.getElementById("sendLabel");
    const spinner = document.getElementById("spinner");
    const resetBtn = document.getElementById("resetBtn");

    function setStatus(type, message){
      statusEl.className = "status " + (type || "");
      statusEl.textContent = message || "";
      statusEl.style.display = message ? "block" : "none";
    }

    function setLoading(isLoading){
      sendBtn.disabled = isLoading;
      spinner.style.display = isLoading ? "inline" : "none";
      sendLabel.textContent = isLoading ? "Envoi…" : "Envoyez";
    }

    function getFormData(){
      return {
        nom: document.getElementById("nom").value.trim(),
        email: document.getElementById("email").value.trim(),
        sujet: document.getElementById("sujet").value.trim(),
        criticite: document.getElementById("criticite").value,
        telephone: document.getElementById("telephone").value.trim(),
        message: document.getElementById("message").value.trim(),
        sentAt: new Date().toISOString(),
        source: "contactez-nous"
      };
    }

    function validate(data){
      if(!data.nom) return "Le champ Nom est requis.";
      if(!data.email) return "Le champ Email est requis.";
      if(!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(data.email)) return "Email invalide.";
      if(!data.sujet) return "Le champ Sujet est requis.";
      if(!data.criticite) return "Le champ Criticité est requis.";
      if(!data.message) return "Le champ Message est requis.";
      return null;
    }

    async function sendToLogicApp(payload){
      const res = await fetch(LOGIC_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const text = await res.text().catch(() => "");
      if(!res.ok){
        throw new Error(`Erreur HTTP ${res.status}\\n${text || "Réponse vide"}`);
      }
      return text;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setStatus("", "");

      const data = getFormData();
      const err = validate(data);
      if(err){
        setStatus("err", err);
        return;
      }

      // ✅ Payload JSON envoyé (À ADAPTER selon ton schéma exact "étape 3.a")
      const payload = {
        nom: data.nom,
        email: data.email,
        sujet: data.sujet,
        criticite: data.criticite,
        telephone: data.telephone || null,
        message: data.message,
        sentAt: data.sentAt,
        source: data.source
      };

      try{
        setLoading(true);
        const resp = await sendToLogicApp(payload);
        setStatus("ok", "Message envoyé avec succès.\n" + (resp ? ("Réponse: " + resp) : ""));
        form.reset();
      }catch(ex){
        setStatus("err", ex?.message || "Erreur lors de l’envoi.");
      }finally{
        setLoading(false);
      }
    });

    resetBtn.addEventListener("click", () => {
      form.reset();
      setStatus("", "");
    });
  </script>
</body>
</html>
