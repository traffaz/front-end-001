<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact Us</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2d;
      --text:#e8eefc;
      --muted:#a9b7d1;
      --line:rgba(255,255,255,.12);
      --primary:#4f8cff;
      --primary2:#2f6fff;
      --danger:#ff4f6d;
      --ok:#29d391;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 14px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(79,140,255,.25), transparent 60%),
                  radial-gradient(900px 500px at 90% 10%, rgba(41,211,145,.18), transparent 55%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{ width:min(860px, 100%); }

    .header{ margin-bottom:16px; }

    .header h1{ margin:0 0 6px; font-size:28px; }

    .header p{ margin:0; color:var(--muted); }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow:hidden;
    }

    .card-body{ padding:18px; }

    form{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }

    .field{ display:flex; flex-direction:column; gap:8px; }

    label{ font-size:13px; color:var(--muted); }

    input, textarea, select{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(10,16,30,.55);
      color:var(--text);
      outline:none;
    }

    input:focus, textarea:focus, select:focus{
      border-color: rgba(79,140,255,.7);
    }

    textarea{ min-height:120px; resize:vertical; }

    .full{ grid-column: 1 / -1; }

    .actions{
      grid-column: 1 / -1;
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin-top:6px;
    }

    button{
      border:0;
      border-radius:12px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
      color:white;
      background: linear-gradient(180deg, var(--primary), var(--primary2));
    }

    button:disabled{ opacity:.6; cursor:not-allowed; }

    .secondary{
      background: transparent;
      border:1px solid rgba(255,255,255,.18);
      color: var(--text);
      font-weight:600;
    }

    .status{
      grid-column: 1 / -1;
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(17,26,45,.55);
      display:none;
      white-space: pre-wrap;
    }

    .status.ok{
      display:block;
      border-color: rgba(41,211,145,.35);
      color: rgba(210,255,238,.95);
    }

    .status.err{
      display:block;
      border-color: rgba(255,79,109,.45);
      color: rgba(255,210,219,.95);
    }

    @media (max-width: 720px){
      form{ grid-template-columns: 1fr; }
      button{ width:100%; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <h1>Contact Us</h1>
      <p>Submit your request and select the appropriate criticity level.</p>
    </div>

    <div class="card">
      <div class="card-body">
        <form id="contactForm" novalidate>

          <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" required />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" required />
          </div>

          <div class="field full">
            <label for="subject">Subject</label>
            <input id="subject" type="text" required />
          </div>

          <div class="field">
            <label for="criticity">Criticity</label>
            <select id="criticity" required>
              <option value="" disabled selected>Select...</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
              <option value="Critical">Critical</option>
            </select>
          </div>

          <div class="field">
            <label for="phone">Phone (optional)</label>
            <input id="phone" type="tel" />
          </div>

          <div class="field full">
            <label for="message">Message</label>
            <textarea id="message" required></textarea>
          </div>

          <div id="status" class="status"></div>

          <div class="actions">
            <button type="button" class="secondary" id="resetBtn">Reset</button>
            <button type="submit" id="sendBtn">Send</button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <script>
    const LOGIC_APP_URL = "YOUR_LOGIC_APP_URL_HERE";

    const form = document.getElementById("contactForm");
    const statusEl = document.getElementById("status");

    function setStatus(type, message){
      statusEl.className = "status " + (type || "");
      statusEl.textContent = message;
      statusEl.style.display = message ? "block" : "none";
    }

    function getFormData(){
      return {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.replace(/\s+/g, "").trim(),
        subject: document.getElementById("subject").value.trim(),
        criticity: document.getElementById("criticity").value,
        phone: document.getElementById("phone").value.trim(),
        message: document.getElementById("message").value.trim(),
        sentAt: new Date().toISOString()
      };
    }

    function validate(data){
      if(!data.name) return "Name is required.";
      if(!data.email) return "Email is required.";
      if(!document.getElementById("email").checkValidity()) return "Invalid email address.";
      if(!data.subject) return "Subject is required.";
      if(!data.criticity) return "Criticity is required.";
      if(!data.message) return "Message is required.";
      return null;
    }

    async function sendToLogicApp(payload){
      const response = await fetch(LOGIC_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if(!response.ok){
        throw new Error("HTTP Error " + response.status);
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setStatus("", "");

      const data = getFormData();
      const error = validate(data);

      if(error){
        setStatus("err", error);
        return;
      }

      try{
        await sendToLogicApp(data);
        setStatus("ok", "Message sent successfully.");
        form.reset();
      }catch(err){
        setStatus("err", "An error occurred while sending the message.");
      }
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      form.reset();
      setStatus("", "");
    });
  </script>
</body>
</html>
